name: CI to build and push flask app

on:
  push:
    branches: [ "main" ]
    paths-ignore:
    - "helm/flask-app/values.yaml"

concurrency:
  group: docker-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write

    outputs:
      sha_tag: ${{ steps.meta.outputs.sha_tag }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Extract Git metadata
      id: meta
      run: |
        echo "sha_tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/flask-app:latest
          ${{ secrets.DOCKER_USERNAME }}/flask-app:${{ steps.meta.outputs.sha_tag }}
        cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/flask-app:buildcache
        cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/flask-app:buildcache,mode=max

  update-helm-values:
    runs-on: ubuntu-latest
    needs: build-and-push

    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        ref: main

    - name: Update Helm values image tag
      run: |
        python3 - <<'PY'
        from pathlib import Path
        import os
        import re

        values_file = Path("helm/flask-app/values.yaml")
        sha_tag = os.environ["SHA_TAG"]
        data = values_file.read_text()

        pattern = r'(^\s*tag:\s*")[^"]*(".*$)'
        replacement = rf'\g<1>{sha_tag}\g<2>'

        new_data, count = re.subn(pattern, replacement, data, flags=re.MULTILINE)

        if count == 0:
            raise SystemExit("Could not find image.tag in helm/flask-app/values.yaml")

        values_file.write_text(new_data)
        print(f"Updated image.tag to {sha_tag}")
        PY
      env:
        SHA_TAG: ${{ needs.build-and-push.outputs.sha_tag }}

    - name: Commit and push Helm values update
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

        git add helm/flask-app/values.yaml

        if git diff --cached --quiet; then
          echo "No changes to commit"
          exit 0
        fi

        git commit -m "chore(cd): update flask image tag to ${{ needs.build-and-push.outputs.sha_tag }} [skip ci]"
        git push origin main
